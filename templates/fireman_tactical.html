<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireSafe AI - Agent Terminal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px 20px;
            overflow-y: auto;
            height: 100vh;
        }
        .mission-card {
            background: linear-gradient(145deg, rgba(230,57,70,0.12), rgba(16,14,18,0.92));
            border: 1px solid rgba(230,57,70,0.4);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 16px;
        }
        .mission-status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
        .mission-stat { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 14px; text-align: center; }
        .mission-stat h4 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
        .mission-stat .val { font-size: 1.4rem; font-weight: 800; color: #ff9f43; }
        .action-btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            margin-bottom: 10px; font-family: 'Inter', sans-serif;
        }
        .action-btn:hover { transform: translateY(-2px); }
        .btn-arrived { background: linear-gradient(90deg, #ff6a00, #ee0979); color: #fff; box-shadow: 0 4px 15px rgba(255,100,0,0.4); }
        .btn-complete { background: linear-gradient(90deg, #11998e, #38ef7d); color: #000; box-shadow: 0 4px 15px rgba(50,200,100,0.4); }
        .btn-hq { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); }
        .empty-mission { text-align: center; padding: 50px 20px; }
        .empty-mission .icon { font-size: 3rem; display: block; margin-bottom: 15px; filter: grayscale(0.5); }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(230, 57, 70, 0); }
            100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); }
        }
        .pulsing-alert {
            animation: pulse-red 2s infinite;
            border-color: #e63946 !important;
        }
    </style>
</head>
<body>
    <!-- Fire Background -->
    <div class="fire-container">
        <div class="flame flame-glow"></div>
        <div class="flame flame-mid"></div>
        <div class="flame flame-left"></div>
        <div class="flame flame-right"></div>
        <div class="flame flame-inner"></div>
        <div class="flame flame-core"></div>
    </div>
    <div class="ember-container" id="ember-container"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="brand">
                <h1>🚒 AGENT</h1>
            </div>
            <nav class="nav-buttons">
                <button class="nav-btn active" id="btn-dashboard" onclick="setMode('dashboard')">
                    <span class="icon">🛰️</span> MISSION
                </button>
                <button class="nav-btn" id="btn-view-reports" onclick="setMode('reports')">
                    <span class="icon">📋</span> HISTORY
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="system-status">LINK SECURE</div>
                <a href="/logout" style="color:rgba(255,255,255,0.3); font-size:0.75rem; text-decoration:none; margin-top:8px; display:block;">🚪 Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar-premium">
                <div class="search-container-modern">
                    <span class="search-icon-modern">🔍</span>
                    <input type="text" placeholder="Search for unit, incident, or place..." id="search-input">
                    <span class="search-shortcut">⌘ + Space</span>
                </div>

                <div class="header-actions-premium">
                    <div class="clock-premium">
                        <span id="current-time">00:00:00</span>
                    </div>
                    <button class="action-circle" onclick="refreshData()"><i class="icon-refresh">🔄</i></button>
                    <div class="notif-wrapper">
                        <button id="btn-notifications" class="action-circle">
                            🔔<span id="notif-badge" class="notif-badge-premium hidden">0</span>
                        </button>
                        <div id="notif-dropdown" class="notif-dropdown-premium hidden">
                            <div class="notif-header-premium">
                                <h3>TACTICAL ALERTS</h3>
                                <button class="clear-all" onclick="clearAllNotifications()">Clear All</button>
                            </div>
                            <div id="notif-list" class="notif-list-premium">
                                <div class="notif-empty">📡 Scanning for alerts...</div>
                            </div>
                        </div>
                    </div>
                    <button id="theme-toggle" class="action-circle" title="Toggle Dark/Light Mode">🌙</button>
                    <button id="view-toggle" class="action-circle" onclick="toggleMapView()" title="Toggle Map/Panels Focus">↕️</button>

                    <div class="user-profile-premium">
                        <img src="{{ user.picture or 'https://cdn-icons-png.flaticon.com/512/149/149071.png' }}"
                            alt="Profile" class="profile-img-mod">
                        <div class="profile-info-mod">
                            <span class="profile-name">{{ user.name }}</span>
                            <span class="profile-handle">{{ user.email }}</span>
                        </div>
                        <span class="profile-arrow">▾</span>
                    </div>
                </div>
            </header>

            <div id="map" class="map-view glass-panel">
                <div id="weather-widget" class="weather-widget"></div>
            </div>

            <div class="panels-container">
                <div class="drawer-handle" onclick="toggleMapView()">
                    <div class="handle-bar"></div>
                    <span class="handle-text">TACTICAL DATA DRAWER</span>
                </div>

                <!-- Mission Panel -->
                <div id="panel-placeholder" class="dashboard-panel-section">
                    <div class="dashboard-grid">
                        <div class="dash-card tactical-panel" style="grid-column: span 1.5;">
                            <h3>🚒 TACTICAL MISSION CENTER</h3>
                            <div id="active-mission-container" style="margin-top:20px;">
                                <div class="empty-state">📡 Scanning for emergency dispatches...</div>
                            </div>
                            
                            <div id="agent-controls" class="hidden" style="margin-top:20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                <button class="action-btn btn-arrived" onclick="updateMissionStatus(null, 'arrived')">
                                    📍 ARRIVED ON SITE
                                </button>
                                <button class="action-btn btn-complete" onclick="updateMissionStatus(null, 'extinguished')">
                                    ✅ MISSION COMPLETED
                                </button>
                            </div>
                        </div>
                        <div class="dash-card">
                            <h3>📊 Mission Pulse</h3>
                            <div style="height: 140px;"><canvas id="trendChart"></canvas></div>
                        </div>
                    </div>
                </div>

                <!-- History Panel -->
                <div id="panel-reports" class="dashboard-panel-section hidden">
                    <div class="dash-card">
                        <h3>📋 Mission History</h3>
                        <table style="width:100%; border-collapse:collapse; margin-top:20px;">
                            <thead>
                                <tr style="background: rgba(255,255,255,0.03);">
                                    <th style="padding:15px; color:var(--electric-blue);">ID</th>
                                    <th style="padding:15px; color:var(--electric-blue);">TIME</th>
                                    <th style="padding:15px; color:var(--electric-blue);">LOCATION</th>
                                    <th style="padding:15px; color:var(--electric-blue);">SEVERITY</th>
                                    <th style="padding:15px; color:var(--electric-blue);">STATUS</th>
                                </tr>
                            </thead>
                            <tbody id="reports-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden -->
    <input type="hidden" id="user-role" value="fireman">
    <div id="toast-container" class="toast-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}?v={{ range(1, 99999) | random }}"></script>
    <script src="{{ url_for('static', filename='js/fire_particles.js') }}"></script>
</body>
</html>
